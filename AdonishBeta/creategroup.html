<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Group</title>
</head>
<style>
    .block-start{
        width: 1537px;
        height: 120px;
        margin-top: -10px;
        margin-left: -10px;
        background-color: rgb(0, 8, 231);
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.8);
    }

    .block-start #user{
        width: 45px;
        height: 45px;
        position: absolute;
        left: 1430px;
        top: 30px;
        
    }

    .block-start #profile{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 20px;
        color: rgb(241, 253, 255);
        position: absolute;
        left: 1410px;
        top: 60px;
    }

    .block-start #logoadonish{
        width:70px;
        height: 45px;
        position: absolute;
        left: 20px;
        top: 30px;
    }

    .block-start #block-start-h1-adonish{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 40px;
        color: rgb(241, 253, 255);
        position: absolute;
        left: 100px;
        top: 0px;
    }

    .block-start #notification{
        width: 45px;
        height: 45px;
        position: absolute;
        left: 1360px;
        top: 30px;
    }

    #creategrouptxt{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 45px;
        color: rgb(241, 253, 255);
        position: absolute;
        left: 610px;
        top: 0px;
    }

    .block-create-group{
        width: 600px;
        height: 600px;
        background-color: rgb(241, 253, 255);
        margin: 90px auto;
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.4);
    }

    .block-create-group h2{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 25px;
        color: rgb(28, 32, 153);
        margin-left: 60px;
        margin-top: 10px;
    }

    .block-create-group #namegroup, .block-create-group #lesson, .block-create-group #time, .block-create-group #description{
        width: 350px;
        height: 40px;
        margin-left: 60px;
        margin-top: 0px;
        border-radius: 5px;
        border: 1px solid rgb(77, 77, 77);
        padding-left: 10px;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
        font-size: 15px;
    }

    .block-create-group #create-btn{
        width: 300px;
        height: 40px;
        background-color: rgb(28, 32, 153);
        color: white;
        border: none;
        border-radius: 5px;
        margin-left: 140px;
        margin-top: 30px;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    }   

    .block-create-group #create-btn:hover{
        background-color: rgb(28, 32, 153);
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.4);
        transform: scale(1.05);
        transition: all 0.3s ease;
    }


    .block-create-group #student-count{
        width: 350px;
        height: 40px;
        margin-left: 60px;
        margin-top: 0px;
        border-radius: 5px;
        border: 1px solid rgb(77, 77, 77);
        padding-left: 10px;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
        font-size: 15px;
    }

    #backtogroups{
        width: 35px;
        height: 35px;
        position: absolute;
        left: 40px;
        top: 150px;
        cursor: pointer;
    }
    
</style>
<body>
    <div class="block-start">
        <h1 id="block-start-h1-adonish">Adonish</h1>
        <img src="photo/logoAdonish.png" id="logoadonish" alt="">
        <img src="photo/user-icon.png" id="user" alt="">
        <img src="photo/notification.png" id="notification" alt="">
        <h1 id="creategrouptxt">Создать группу</h1>
    </div>

    <div class="block-create-group">
        <h2>Название группы</h2>
        <input type="text" id="namegroup" placeholder="Введите название группы">
        <h2>Урок</h2>
        <input type="text" id="lesson" placeholder="Введите урок">
        <h2>Время</h2>
        <input type="text" id="time" placeholder="Введите время">
        <h2>Описание</h2>
        <input type="text" id="description" placeholder="Введите описание">
        <h2>Количество учеников</h2>
        <input type="number" id="student-count" placeholder="Введите количество учеников">
        <button id="create-btn">Создать группу</button>
    </div>

    <img src="photo/free-icon-back-130882.png" id="backtogroups" alt="" onclick="backtogroups()">

    <script>
        function backtogroups() {
            window.location.href = "groups.html";
        }
    </script>
</body>
</html>
