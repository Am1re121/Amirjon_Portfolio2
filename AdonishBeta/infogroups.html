<body>
    <div class="block-start">

            <img src="photo/Univer-icon.png" id="student-icon-user4" alt="">
            <h2 id="student-name-bar4">Student Name 4</h2>
        </div>
    </div>

    <div id="backk" onclick="backtogroups()"><img src="photo/free-icon-back-130882.png" alt=""></div>

    <script>
        function backtogroups(){
            window.location.href = "groups.html";
        }

        function gotoinfostudents(){
            window.location.href = "studentinfo.html";
        }
