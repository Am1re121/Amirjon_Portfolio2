<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groups</title>
</head>
<style>
    body {
        overflow-x: hidden; 
    }

    .block-start{
        width: 1537px;
        height: 120px;
        margin-top: -10px;
        margin-left: -10px;
        background-color: rgb(0, 8, 231);
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.8);
    }

    .block-start #block-start-put{
        width: 600px;
        height: 45px;
        margin-left: 400px;
        margin-top: 35px;
        border-radius: 10px;
        border: 1px solid rgb(77, 77, 77);
        padding-left: 10px;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
    }

    .block-start #block-start-h1-adonish{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 40px;
        color: rgb(241, 253, 255);
        margin-left: 100px;
        margin-top: -55px;
    }

    .block-start #user{
        width: 45px;
        height: 45px;
        position: absolute;
        left: 1430px;
        top: 30px;
        
    }

    .block-start #profile{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 20px;
        color: rgb(241, 253, 255);
        position: absolute;
        left: 1410px;
        top: 60px;
    }

    .block-start #lupa{
        width: 45px;
        height: 45px;
        position: absolute;
        left: 1020px;
        top: 35px;
    }

    .block-start #notification{
        width: 40px;
        height: 40px;
        position: absolute;
        left: 1370px;
        top: 35px;
    }



    .block-start #logoadonish{
        width:70px;
        height: 45px;
        position: absolute;
        left: 20px;
        top: 30px;
    }

    .block-courses{
        width: 1537px;
        height: 700px;
        margin-top: 0px;
        margin-left: -10px;
        background-color: rgb(241, 253, 255);
    }

    .block-courses #course-javascript, .block-courses #course-python, .block-courses #course-java, .block-courses #course-c{
        width: 400px;
        height: 200px;
        background-color: rgb(40, 45, 213);
        border-radius: 10px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.4);
        margin-top: 20px;
        margin-left: 80px;
        float: left;
        display: flex;
        flex-direction: column;
        justify-content: center;
        transition: all 0.3s ease;
        border: 7px solid rgb(25, 121, 255);
        
    }

    .block-courses #course-javascript h1, .block-courses #course-python h1, .block-courses #course-java h1, .block-courses #course-c h1{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 45px;
        color: rgb(241, 253, 255);
        text-align: center;
        margin-top: 10px;
    }

    .block-courses #course-javascript h2, .block-courses #course-python h2, .block-courses #course-java h2, .block-courses #course-c h2{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 20px;
        color: rgb(241, 253, 255);
        text-align: center;
        margin-top: -10px;
    }


    .block-courses #course-python:hover, .block-courses #course-javascript:hover, .block-courses #course-java:hover, .block-courses #course-c:hover{
        background-color: rgb(40, 45, 213);
        box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.6);
        transform: scale(1.1);
        
    }

    #startgroup{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 50px;
        color: rgb(73, 71, 235);
        margin-left: 680px;
        margin-top: 30px;
    }

    .block-courses #course-javascript h3, .block-courses #course-python h3, .block-courses #course-java h3, .block-courses #course-c h3{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 15px;
        color: rgb(241, 253, 255);
        text-align: center;
        margin-top: -10px;
    }

    

    .creat-group #create-group-btn{
        width: 200px;
        height: 50px;
        background-color: rgb(28, 32, 153);
        color: white;
        border: none;
        border-radius: 10px;
        margin-left: 1250px;
        margin-top: 0px;
        position: absolute;
        top: 150px;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
        display: none;
    }

    .creat-group #create-group-btn:hover{
        background-color: rgb(28, 32, 153);
        color: white;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.4);
    }

    #mygroups{
        width: 150px;
        height: 50px;
        background-color: rgb(101, 84, 255);
        border-radius: 15px;    
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.4);
            position: absolute;
            top: 870px;
        position: absolute;
        left: 1100px;
        top: 30px;
        transition: all 0.3s ease;

    }

    #mygroups h1{
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 20px;
        color: rgb(223, 219, 255);
        text-align: center;
        margin-top: 10px;
    }

    #mygroups:hover{
        background-color: rgb(101, 84, 255);
        box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.6);
        transform: scale(1.1);
        cursor: pointer;
    }


</style>
<body>
    <div class="block-start">
        <input type="text" id="block-start-put" placeholder="Search for groups...">
        <img src="photo/magnifier.png" id="lupa" alt="">
        <h1 id="block-start-h1-adonish">Adonish</h1>
        <img src="photo/logoAdonish.png" id="logoadonish" alt="">
        <img src="photo/user-icon.png" id="user" alt="">
        <img src="photo/notification.png" id="notification" alt="">
    </div>

    <h1 id="startgroup">Группы</h1>

    <div class="block-courses">
        <div id="course-javascript" onclick="gotocourse()">
            <h1 id="jscoursetext">JavaScript</h1>
            <h2 id="jscourseteacher">Rizoev Mansur</h2>
            <h3 id="time">14:00 - 15:30</h3>
        </div>

        <div id="course-python" onclick="gotocourse()">
            <h1 id="pythoncoursetext">Python</h1>
            <h2 id="pythoncourseteacher">Rozikov Parviz</h2>
            <h3 id="time">12:00 - 13:30</h3>
        </div>

        <div id="course-java" onclick="gotocourse()">
            <h1 id="javacoursetext">Java</h1>
            <h2 id="javacourseteacher">James Gosling</h2>
            <h3 id="time">10:00 - 11:30</h3>
        </div>

        <div id="course-c" onclick="gotocourse()">
            <h1 id="cppcoursetext">C++</h1>
            <h2 id="cppcourseteacher">Bjarne Stroustrup</h2>
            <h3 id="time">16:00 - 17:30</h3>
        </div>
    </div>


    <div class="creat-group"> 
        <button id="create-group-btn">Создать группу</button>
    </div>

    <div id="mygroups">
        <h1>Мои группы</h1>
    </div>

    <script>
        let role = localStorage.getItem('role');
        if (role) {
            if (role === "teacher") {
                document.getElementById('create-group-btn').style.display = 'block';
            } else if (role === "student") {
                document.querySelector('#mygroups h1').textContent = 'Мои курсы';
            } else {
                document.getElementById('create-group-btn').style.display = 'none';
                document.getElementById('mygroups').style.display = 'none';
               
            }
        }

        function gotocourse(){
            window.location.href = "infogroups.html";
        }
        
    
    </script>
</body>
</html>
